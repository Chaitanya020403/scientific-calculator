# logstash.conf - ELK Stack Monitoring for Scientific Calculator
# Place this in your Logstash pipeline config directory

input {
  file {
    path => "/path/to/your/project/calculator.log"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    tags => ["scientific-calculator"]
  }
}

filter {
  grok {
    match => {
      "message" => "%{MONTHDAY}-%{MONTH}-%{YEAR} %{TIME} %{WORD:class} %{WORD:level} %{GREEDYDATA:log_message}"
    }
  }

  mutate {
    add_field => {
      "application" => "scientific-calculator"
      "environment" => "local"
    }
  }

  if [log_message] =~ "squareRoot" {
    mutate { add_field => { "operation" => "squareRoot" } }
  } else if [log_message] =~ "factorial" {
    mutate { add_field => { "operation" => "factorial" } }
  } else if [log_message] =~ "naturalLog" {
    mutate { add_field => { "operation" => "naturalLog" } }
  } else if [log_message] =~ "power" {
    mutate { add_field => { "operation" => "power" } }
  }

  if [level] == "WARNING" {
    mutate { add_tag => ["error"] }
  }
}

output {
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "scientific-calculator-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}
